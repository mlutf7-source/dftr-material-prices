name: Update Material Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update prices from GUYC
        run: node scripts/update-prices.cjs

      - name: Commit updated prices
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add prices.json index.html source-text-preview.txt
          if git diff --cached --quiet; then
            echo "No price changes"
          else
            git commit -m "Update material prices"
            git push
          fi
